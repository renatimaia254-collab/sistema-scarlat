<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Ligador - Sistema Scarlat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .dashboard { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; flex-wrap: wrap; }
        .form-col, .fila-col { flex: 1; min-width: 280px; }
        .card { background: white; border-radius: 28px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header { background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; padding: 20px; text-align: center; }
        .header-fila { background: linear-gradient(135deg, #2c3e50 0%, #1a1a2e 100%); color: white; padding: 20px; text-align: center; }
        .logo { font-size: 48px; }
        .form-body { padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
        input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 14px; font-size: 16px; }
        input:focus { outline: none; border-color: #CC092F; }
        button { width: 100%; background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .status-fila { background: #f8f9fa; padding: 16px; border-radius: 20px; margin-bottom: 16px; }
        .stats { display: flex; gap: 12px; justify-content: space-around; flex-wrap: wrap; }
        .stat-box { text-align: center; flex: 1; padding: 12px; background: white; border-radius: 16px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #CC092F; }
        .stat-label { font-size: 11px; color: #666; }
        .proximo-card { background: linear-gradient(135deg, #CC092F 0%, #8B0620 100%); color: white; padding: 16px; border-radius: 16px; margin-top: 16px; }
        .proximo-card .nome { font-size: 18px; font-weight: bold; }
        .lista-fila { max-height: 350px; overflow-y: auto; }
        .lista-encerrados { margin-top: 20px; border-top: 2px solid #ddd; padding-top: 15px; }
        .fila-item-ligador { background: white; border-left: 4px solid #CC092F; padding: 12px; margin-bottom: 8px; border-radius: 12px; font-size: 13px; }
        .fila-item-encerrado { background: #f0f0f0; border-left: 4px solid #27ae60; padding: 12px; margin-bottom: 8px; border-radius: 12px; font-size: 13px; opacity: 0.8; }
        .posicao { display: inline-block; width: 28px; height: 28px; background: #CC092F; color: white; border-radius: 50%; text-align: center; line-height: 28px; font-size: 12px; font-weight: bold; margin-right: 10px; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #27ae60; color: white; padding: 12px; border-radius: 12px; text-align: center; z-index: 9999; }
        .status-online { position: fixed; top: 10px; right: 10px; background: #27ae60; color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; z-index: 1000; }
        @media (max-width: 768px) { body { padding: 10px; } .stat-number { font-size: 22px; } }
    </style>
</head>
<body>
    <div id="statusIndicator" class="status-online">🟢 Conectado</div>
    <div class="dashboard">
        <div class="form-col">
            <div class="card">
                <div class="header"><div class="logo">📞</div><h1>Novo Agendamento</h1></div>
                <div class="form-body">
                    <form id="formLigador">
                        <div class="form-group"><label>👤 Nome do Cliente *</label><input type="text" id="nomeCliente" required placeholder="Digite o nome"></div>
                        <div class="form-group"><label>📱 Telefone do Cliente *</label><input type="tel" id="telefoneCliente" required placeholder="(11) 99999-9999"></div>
                        <div class="form-group"><label>📋 Assunto *</label><input type="text" id="assunto" required placeholder="Motivo do atendimento"></div>
                        <div class="form-group"><label>👩‍💼 Nome da Gerente</label><input type="text" id="nomeGerente" value="Scarlat"></div>
                        <div class="form-group"><label>📅 Data e Horário *</label><input type="datetime-local" id="horarioAgendado" required></div>
                        <div class="form-group"><label>🏷️ Seu Vulgo *</label><input type="text" id="vulgo" required placeholder="Seu apelido"></div>
                        <div class="form-group"><label>💬 Seu WhatsApp *</label><input type="tel" id="zap" required placeholder="11999999999"></div>
                        <button type="submit">📨 AGENDAR CLIENTE</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="fila-col">
            <div class="card">
                <div class="header-fila"><div class="logo">📊</div><h1>Status da Fila</h1><p>Atualização em tempo real</p></div>
                <div class="form-body"><div id="filaStatus"></div></div>
            </div>
        </div>
    </div>
    <script>
        let fichas = [], eventSource = null;

        function connectSSE() {
            if (eventSource) eventSource.close();
            eventSource = new EventSource('/api/events');
            eventSource.onopen = () => { document.getElementById('statusIndicator').innerHTML = '🟢 Tempo Real'; document.getElementById('statusIndicator').style.background = '#27ae60'; };
            eventSource.addEventListener('nova-ficha', () => carregarDados());
            eventSource.addEventListener('status-alterado', () => carregarDados());
            eventSource.addEventListener('ficha-excluida', () => carregarDados());
            eventSource.onerror = () => { document.getElementById('statusIndicator').innerHTML = '🔴 Desconectado'; document.getElementById('statusIndicator').style.background = '#e74c3c'; setTimeout(connectSSE, 3000); };
        }

        async function carregarDados() {
            try { const response = await fetch('/api/fichas'); fichas = await response.json(); renderizarStatusFila(); } 
            catch (error) { console.error('Erro:', error); }
        }

        function renderizarStatusFila() {
            const container = document.getElementById('filaStatus');
            const naoEncerrados = fichas.filter(f => f.status !== 'encerrado');
            const encerrados = fichas.filter(f => f.status === 'encerrado');
            const filaOrdenada = [...naoEncerrados].sort((a,b) => { const d = new Date(a.horarioAgendado) - new Date(b.horarioAgendado); if (d !== 0) return d; return a.id - b.id; });
            const total = filaOrdenada.length;
            const proximo = filaOrdenada[0] || null;
            
            let html = `<div class="status-fila"><div class="stats">
                <div class="stat-box"><div class="stat-number">${total}</div><div class="stat-label">Total na fila</div></div>
                <div class="stat-box"><div class="stat-number">${filaOrdenada.filter(f => f.status === 'em_andamento').length}</div><div class="stat-label">Em atendimento</div></div>
                <div class="stat-box"><div class="stat-number">${filaOrdenada.filter(f => f.status === 'aguardando').length}</div><div class="stat-label">Aguardando</div></div>
            </div>`;
            
            if (proximo) {
                const horario = new Date(proximo.horarioAgendado);
                html += `<div class="proximo-card"><h4>🎯 PRÓXIMO DA FILA</h4>
                    <div class="nome">${proximo.nomeCliente}</div>
                    <div>📋 ${proximo.assunto}</div>
                    <div>📅 ${horario.toLocaleDateString('pt-BR')} às ${horario.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</div>
                    <div>👤 Ligador: ${proximo.vulgo}</div>
                </div>`;
            } else {
                html += `<div class="proximo-card" style="background:#666"><h4>✅ Nenhum cliente na fila</h4></div>`;
            }
            
            if (filaOrdenada.length > 0) {
                html += `<div style="margin-top:20px"><h3>📋 Fila completa:</h3><div class="lista-fila">`;
                filaOrdenada.forEach((f, idx) => {
                    const horario = new Date(f.horarioAgendado);
                    const statusIcon = f.status === 'em_andamento' ? '🔵' : '🟡';
                    html += `<div class="fila-item-ligador"><span class="posicao">${idx+1}º</span>
                        <strong>${f.nomeCliente}</strong> - ${f.assunto}<br>
                        <span style="font-size:11px;color:#666;">📅 ${horario.toLocaleDateString('pt-BR')} ${horario.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})} ${statusIcon} ${f.status === 'em_andamento' ? 'Em andamento' : 'Aguardando'}</span>
                    </div>`;
                });
                html += `</div></div>`;
            }
            
            if (encerrados.length > 0) {
                html += `<div class="lista-encerrados"><h3>✅ Finalizados (${encerrados.length})</h3>`;
                encerrados.slice(-10).reverse().forEach(f => {
                    const horario = new Date(f.horarioAgendado);
                    html += `<div class="fila-item-encerrado">
                        <strong>${f.nomeCliente}</strong> - ${f.assunto}<br>
                        <span style="font-size:11px;color:#666;">📅 ${horario.toLocaleDateString('pt-BR')}</span>
                    </div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? '#e74c3c' : '#27ae60';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('formLigador').addEventListener('submit', async function(e) {
            e.preventDefault();
            const horario = document.getElementById('horarioAgendado').value;
            if (!horario) { showToast('⚠️ Selecione DATA e HORÁRIO!', true); return; }
            
            const novaFicha = {
                nomeCliente: document.getElementById('nomeCliente').value,
                telefoneCliente: document.getElementById('telefoneCliente').value,
                assunto: document.getElementById('assunto').value,
                nomeGerente: document.getElementById('nomeGerente').value || 'Scarlat',
                horarioAgendado: horario,
                vulgo: document.getElementById('vulgo').value,
                zap: document.getElementById('zap').value
            };
            
            try {
                const response = await fetch('/api/fichas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(novaFicha) });
                if (response.ok) { document.getElementById('formLigador').reset(); showToast('✅ Cliente agendado!'); } 
                else { showToast('❌ Erro ao agendar', true); }
            } catch (error) { showToast('❌ Erro de conexão', true); }
        });

        connectSSE();
        carregarDados();
        setInterval(carregarDados, 5000);
    </script>
</body>
</html>
